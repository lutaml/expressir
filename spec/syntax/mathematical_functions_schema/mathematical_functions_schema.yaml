          id: func
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_application.func
        - _class: Expressir::Model::References::SimpleReference
          id: arguments
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_application.arguments
  - _class: Expressir::Model::Declarations::Entity
    id: maths_space
    remarks:
    - |-
      This abstract supertype includes all the representations for mathematical spaces considered in this schema.

      [NOTE]
      ====
      Most of the entity declarations in the remainder of this clause will have dual inheritance. They will inherit from either <<express:mathematical_functions_schema.maths_space,maths_space>> or <<express:mathematical_functions_schema.maths_function,maths_function>> to acquire their mathematical semantics, and they will inherit from <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>, <<express:iso13584_generic_expressions_schema.unary_generic_expression,unary_generic_expression>>, or <<express:iso13584_generic_expressions_schema.multiple_arity_generic_expression,multiple_arity_generic_expression>> to identify their syntactical role in a mathematical expression. The choice between modelling something as a complicated constant (inheriting from <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>) or as a general expression (inheriting from *unary_* or <<express:iso13584_generic_expressions_schema.multiple_arity_generic_expression,multiple_arity_generic_expression>> has subtle and extensive consequences.

      For the applications for which this document has been created, there is a strong preference for the semantic simplicity of modeling complicated constants over the semantic complexity of general expressions with many free variables and larger numbers of complexly related instances. In particular, all the entity types representing mathematical spaces are designed to represent specific constant spaces rather than the indeterminate spaces which would result from the presence of free variables in a mathematical space expression. Operations on mathematical spaces may be added to this schema if and whan an application is identified which requires such generality.
      ====
    abstract: true
    supertype_expression:
      _class: Expressir::Model::SupertypeExpressions::OneofSupertypeExpression
      operands:
      - _class: Expressir::Model::References::SimpleReference
        id: elementary_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.elementary_space
      - _class: Expressir::Model::References::SimpleReference
        id: finite_integer_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_integer_interval
      - _class: Expressir::Model::References::SimpleReference
        id: integer_interval_from_min
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.integer_interval_from_min
      - _class: Expressir::Model::References::SimpleReference
        id: integer_interval_to_max
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.integer_interval_to_max
      - _class: Expressir::Model::References::SimpleReference
        id: finite_real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_real_interval
      - _class: Expressir::Model::References::SimpleReference
        id: real_interval_from_min
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_interval_from_min
      - _class: Expressir::Model::References::SimpleReference
        id: real_interval_to_max
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_interval_to_max
      - _class: Expressir::Model::References::SimpleReference
        id: cartesian_complex_number_region
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.cartesian_complex_number_region
      - _class: Expressir::Model::References::SimpleReference
        id: polar_complex_number_region
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region
      - _class: Expressir::Model::References::SimpleReference
        id: finite_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_space
      - _class: Expressir::Model::References::SimpleReference
        id: uniform_product_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.uniform_product_space
      - _class: Expressir::Model::References::SimpleReference
        id: listed_product_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.listed_product_space
      - _class: Expressir::Model::References::SimpleReference
        id: extended_tuple_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.extended_tuple_space
      - _class: Expressir::Model::References::SimpleReference
        id: function_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: generic_expression
  - _class: Expressir::Model::Declarations::Entity
    id: elementary_space
    remarks:
    - These instances of <<express:mathematical_functions_schema.elementary_space,elementary_space>>
      represent unique and frequently referenced mathematical spaces.
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      is used to represent the elementary mathematical spaces identified by the enumeration
      type *elementary_maths_space*.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: space_id
      remarks:
      - The enumeration item which identifies the space being represented.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: elementary_space_enumerators
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.elementary_space_enumerators
  - _class: Expressir::Model::Declarations::Entity
    id: finite_integer_interval
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical spaces which are non-empty, finite intervals of integers.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: min
      remarks:
      - The least integer in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Integer
    - _class: Expressir::Model::Declarations::Attribute
      id: max
      remarks:
      - The largest integer in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Integer
    - _class: Expressir::Model::Declarations::DerivedAttribute
      id: size
      remarks:
      - The derived number of integers which are members of the interval.
      kind: DERIVED
      type:
        _class: Expressir::Model::References::SimpleReference
        id: positive_integer
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.positive_integer
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: ADDITION
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: SUBTRACTION
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: max
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_integer_interval.max
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: min
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_integer_interval.min
        operand2:
          _class: Expressir::Model::Literals::Integer
          value: '1'
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - |-
        The lower bound shall be less than or equal to the upper bound.

        NOTE: That <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> is a supertype of <<express:mathematical_functions_schema.finite_integer_interval,finite_integer_interval>> may seem strange at first. The reason is as follows: An instance of <<express:mathematical_functions_schema.finite_integer_interval,finite_integer_interval>> denotes a unique mathematical space. Therefore, it may play the role of a constant in the syntax of mathematical expressions. It is not a "literal" in the ordinary sense, that is, a language token which directly encodes a value, but <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> is the only choice of supertype from *generic_expressions_schema* which gives these instances their proper role as constants in expressions.
      expression:
        _class: Expressir::Model::References::SimpleReference
        id: min
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_integer_interval.min
  - _class: Expressir::Model::Declarations::Entity
    id: integer_interval_from_min
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents semi-infinite integer intervals which contain all integers greater
      than or equal to a given integer.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: min
      remarks:
      - The smallest integer in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Integer
  - _class: Expressir::Model::Declarations::Entity
    id: integer_interval_to_max
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents semi-infinite integer intervals which contain all integers less than
      or equal to a given integer.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: max
      remarks:
      - |-
        The largest integer in the interval.

        [example]
        ====
        The space of all negative integers may be represented by <<express:mathematical_functions_schema.maths_space,maths_space>> () || <<express:iso13584_generic_expressions_schema.generic_expression,generic_expression>> () || <<express:iso13584_generic_expressions_schema.simple_generic_expression,simple_generic_expression>> () || <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> () || <<express:mathematical_functions_schema.integer_interval_to_max,integer_interval_to_max>> (-1).
        ====
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Integer
  - _class: Expressir::Model::Declarations::Entity
    id: finite_real_interval
    remarks:
    - |-
      This type of <<express:mathematical_functions_schema.maths_space,maths_space>> and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> represents mathematical spaces which are intervals of the real numbers having finite positive length.

      NOTE: The finiteness of these intervals is exhibited in their lengths, not the number of members.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: min
      remarks:
      - The lower bound of the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: min_closure
      remarks:
      - Indicator for whether the lower bound is excluded ( *open* ) or included (
        *closed* ) in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: open_closed
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed
    - _class: Expressir::Model::Declarations::Attribute
      id: max
      remarks:
      - The upper bound of the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: max_closure
      remarks:
      - Indicator for whether the upper bound is excluded ( *open* ) or included (
        *closed* ) in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: open_closed
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The lower bound shall be strictly less than the upper bound.
      expression:
        _class: Expressir::Model::References::SimpleReference
        id: min
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_real_interval.min
  - _class: Expressir::Model::Declarations::Entity
    id: real_interval_from_min
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical spaces which are intervals of real numbers which are
      bounded below but not bounded above. That is, it represents intervals which
      contain all real numbers either greater than, or greater than or equal to, a
      given real number.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: min
      remarks:
      - The lower bound for the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: min_closure
      remarks:
      - Indicator for whether the lower bound is excluded ( *open* ) or included (
        *closed* ) in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: open_closed
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed
  - _class: Expressir::Model::Declarations::Entity
    id: real_interval_to_max
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical spaces which are intervals of real numbers which are
      bounded above but not bounded below. That is, it represents intervals which
      contain all real numbers either less than, or less than or equal to, a given
      real number.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: max
      remarks:
      - The upper bound for the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: max_closure
      remarks:
      - Indicator for whether the upper bound is excluded ( *open* ) or included (
        *closed* ) in the interval.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: open_closed
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed
  - _class: Expressir::Model::Declarations::Entity
    id: cartesian_complex_number_region
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents subsets of the complex numbers defined by restricting the real parts
      to a specified, non-trivial, real interval and the imaginary parts to another
      such interval.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: real_constraint
      remarks:
      - The interval to which the real parts of the members shall belong.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_interval
    - _class: Expressir::Model::Declarations::Attribute
      id: imag_constraint
      remarks:
      - The interval to which the imaginary parts of the members shall belong.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_interval
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - This type shall not be used to represent the space of all complex numbers.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: OR
          operand1:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: OR
            operand1:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: min_exists
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.min_exists
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: real_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.cartesian_complex_number_region.real_constraint
            operand2:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: max_exists
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.max_exists
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: real_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.cartesian_complex_number_region.real_constraint
          operand2:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: min_exists
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.min_exists
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: imag_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.cartesian_complex_number_region.imag_constraint
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: max_exists
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.max_exists
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: imag_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.cartesian_complex_number_region.imag_constraint
  - _class: Expressir::Model::Declarations::Entity
    id: polar_complex_number_region
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents subsets of the complex numbers defined by restricting the distance
      and direction from a designated centre to specified, non-trivial, real intervals.
      Direction shall be measured in radians from the ray emanating from the designated
      centre parallel to the positive real axis, using values stem:[theta] in the
      range stem:[-pi < theta <= pi], and using positive values for directions tending
      upward. The direction stem:[theta] of a complex number from the designated centre
      shall be deemed to belong to a real interval if either stem:[theta] or stem:[theta
      + 2pi] is a member of the interval.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: centre
      remarks:
      - The designated centre.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: complex_number_literal
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal
    - _class: Expressir::Model::Declarations::Attribute
      id: distance_constraint
      remarks:
      - The interval constraining the distances of the members from the centre.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_interval
    - _class: Expressir::Model::Declarations::Attribute
      id: direction_constraint
      remarks:
      - The interval constraining the directions of the members from the centre.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: finite_real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_real_interval
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The real interval defining the distance constraint shall have a greatest lower
        bound and it shall be nonnegative.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: AND
        operand1:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: min_exists
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.min_exists
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: distance_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.distance_constraint
        operand2:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: GREATER_THAN_OR_EQUAL
          operand1:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: real_min
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_min
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: distance_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.distance_constraint
          operand2:
            _class: Expressir::Model::Literals::Real
            value: '0.0'
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The lower bound of the real interval defining the direction constraint shall
        be greater than or equal to stem:[-pi] and less than stem:[pi].
      expression:
        _class: Expressir::Model::Expressions::Interval
        low:
          _class: Expressir::Model::Expressions::UnaryExpression
          operator: MINUS
          operand:
            _class: Expressir::Model::References::SimpleReference
            id: PI
        operator1: LESS_THAN_OR_EQUAL
        item:
          _class: Expressir::Model::References::SimpleReference
          id: direction_constraint
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
        operator2: LESS_THAN
        high:
          _class: Expressir::Model::References::SimpleReference
          id: PI
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - The length of the interval defining the direction constraint shall be less
        than or equal to two stem:[pi].
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: SUBTRACTION
        operand1:
          _class: Expressir::Model::References::SimpleReference
          id: direction_constraint
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
        operand2:
          _class: Expressir::Model::References::SimpleReference
          id: direction_constraint
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR4
      remarks:
      - If the length of the interval defining the direction constraint is two stem:[pi],
        then the interval shall be open below.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: LESS_THAN
          operand1:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: SUBTRACTION
            operand1:
              _class: Expressir::Model::References::SimpleReference
              id: direction_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
            operand2:
              _class: Expressir::Model::References::SimpleReference
              id: direction_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
          operand2:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: MULTIPLICATION
            operand1:
              _class: Expressir::Model::Literals::Real
              value: '2.0'
            operand2:
              _class: Expressir::Model::References::SimpleReference
              id: PI
        operand2:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: direction_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: open
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed.open
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR5
      remarks:
      - If all directions are included, then the interval defining the direction constraint
        shall start at stem:[-pi].
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: OR
          operand1:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: LESS_THAN
            operand1:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: SUBTRACTION
              operand1:
                _class: Expressir::Model::References::SimpleReference
                id: direction_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
              operand2:
                _class: Expressir::Model::References::SimpleReference
                id: direction_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
            operand2:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: MULTIPLICATION
              operand1:
                _class: Expressir::Model::Literals::Real
                value: '2.0'
              operand2:
                _class: Expressir::Model::References::SimpleReference
                id: PI
          operand2:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: EQUAL
            operand1:
              _class: Expressir::Model::References::SimpleReference
              id: direction_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
            operand2:
              _class: Expressir::Model::References::SimpleReference
              id: open
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed.open
        operand2:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: direction_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
          operand2:
            _class: Expressir::Model::Expressions::UnaryExpression
            operator: MINUS
            operand:
              _class: Expressir::Model::References::SimpleReference
              id: PI
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR6
      remarks:
      - |-
        This type shall not be used to represent the space of all complex numbers.

        NOTE: Direction is naturally defined only up to an integer multiple of stem:[2pi]. In order to represent _any_ arc of directions via a _single_ interval, a little of this inherent redundancy must be permitted and handled. Thus, the range of possible values for *direction_constraint.max* will be seen to be stem:[-pi] to stem:[3pi].

        NOTE: The effect of rules *WR4*, *WR5*, and *WR6* is to establish value unique representations for the complex number regions representable by this type. That is, two entity instances from this document representing regions of complex numbers represent the same mathematical region if and only if they are value equal as EXPRESS instances.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: OR
          operand1:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: OR
            operand1:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: GREATER_THAN
              operand1:
                _class: Expressir::Model::Expressions::FunctionCall
                function:
                  _class: Expressir::Model::References::SimpleReference
                  id: real_min
                  base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.real_min
                parameters:
                - _class: Expressir::Model::References::SimpleReference
                  id: distance_constraint
                  base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.distance_constraint
              operand2:
                _class: Expressir::Model::Literals::Real
                value: '0.0'
            operand2:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: max_exists
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.max_exists
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: distance_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.distance_constraint
          operand2:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: LESS_THAN
            operand1:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: SUBTRACTION
              operand1:
                _class: Expressir::Model::References::SimpleReference
                id: direction_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
              operand2:
                _class: Expressir::Model::References::SimpleReference
                id: direction_constraint
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
            operand2:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: MULTIPLICATION
              operand1:
                _class: Expressir::Model::Literals::Real
                value: '2.0'
              operand2:
                _class: Expressir::Model::References::SimpleReference
                id: PI
        operand2:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: direction_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.polar_complex_number_region.direction_constraint
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: open
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.open_closed.open
  - _class: Expressir::Model::Declarations::Entity
    id: finite_space
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical spaces with a finite number of members. This includes
      the space with zero members, also known as the empty set.
    remark_items:
    - _class: Expressir::Model::Declarations::RemarkItem
      id: wr
      remarks:
      - The members shall denote distinct mathematical values, for example, the number
        "4" and the expression "2+2" shall not both be members of the same instance
        of <<express:mathematical_functions_schema.finite_space,finite_space>>.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: members
      remarks:
      - The set of members belonging to the space represented.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Set
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_value
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_value
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The members are distinct with respect to value equality.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: VALUE_UNIQUE
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: members
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_space.members
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - All the members which are expressions are constant expressions.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: SIZEOF
        parameters:
        - _class: Expressir::Model::Expressions::QueryExpression
          id: expr
          aggregate_source:
            _class: Expressir::Model::Expressions::QueryExpression
            id: member
            aggregate_source:
              _class: Expressir::Model::References::SimpleReference
              id: members
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_space.members
            expression:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: IN
              operand1:
                _class: Expressir::Model::Literals::String
                value: ISO13584_GENERIC_EXPRESSIONS_SCHEMA.GENERIC_EXPRESSION
              operand2:
                _class: Expressir::Model::Expressions::FunctionCall
                function:
                  _class: Expressir::Model::References::SimpleReference
                  id: TYPEOF
                parameters:
                - _class: Expressir::Model::References::SimpleReference
                  id: member
          expression:
            _class: Expressir::Model::Expressions::UnaryExpression
            operator: NOT
            operand:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: expression_is_constant
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: expr
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - The graph of <<express:mathematical_functions_schema.maths_space,maths_space>>
        references emanating from an instance of <<express:mathematical_functions_schema.finite_space,finite_space>>
        contains no cycles.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: no_cyclic_space_reference
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.no_cyclic_space_reference
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::Expressions::AggregateInitializer
  - _class: Expressir::Model::Declarations::Entity
    id: uniform_product_space
    remarks:
    - |-
      This type of <<express:mathematical_functions_schema.maths_space,maths_space>> and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> represents finite Cartesian product spaces, all of whose factor spaces are the same. These Cartesian products are commonly written using an exponential notation. Let stem:[B] be the space represented by the *base* attribute and stem:[n] be the value of the *exponent* attribute. Then the space represented by the instance is commonly expressed as stem:[B^n].

      NOTE: There is a unique, natural isomorphism between the space stem:[B] and the space stem:[B^1]. It is a very common practice in mathematics to identify these two spaces via this isomorphism and not distinguish between elements of stem:[B] and the corresponding one-tuples in stem:[B^1]. In this schema, this distinction must be maintained in order to avoid computer processing ambiguity in later applications.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: base
      remarks:
      - The <<express:mathematical_functions_schema.maths_space,maths_space>> to which
        the components of the ordered tuples belong, that is, the space which is "multiplied"
        together *exponent* times to form the Cartesian product space.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    - _class: Expressir::Model::Declarations::Attribute
      id: exponent
      remarks:
      - The number of factors in the Cartesian product, which is also the length of
        the ordered tuples belonging to the space being represented.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: positive_integer
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.positive_integer
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The value of *base* is a constant expression.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: expression_is_constant
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: base
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.uniform_product_space.base
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The graph of <<express:mathematical_functions_schema.maths_space,maths_space>>
        references emanating from an instance of <<express:mathematical_functions_schema.uniform_product_space,uniform_product_space>>
        contains no cycles.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: no_cyclic_space_reference
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.no_cyclic_space_reference
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::Expressions::AggregateInitializer
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - The value of *base* shall not be the empty space.
      expression:
        _class: Expressir::Model::References::SimpleReference
        id: base
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.uniform_product_space.base
  - _class: Expressir::Model::Declarations::Entity
    id: listed_product_space
    remarks:
    - |-
      This type of <<express:mathematical_functions_schema.maths_space,maths_space>> and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> represents finite Cartesian product spaces. Its use is required when the factor spaces are not all the same. Let stem:[S_i] be the space represented by the stem:[i]th member of the attribute *factors*, and let the length of the list be stem:[n]. The space represented by the instance is

      [stem%unnumbered]
      ++++
      xx_(i=1)^n S_i
      ++++

      NOTE: The spaces represented by instances of <<express:mathematical_functions_schema.uniform_product_space,uniform_product_space>> are also representable by instances <<express:mathematical_functions_schema.listed_product_space,listed_product_space>>. Since redundant representation is inherent in mathematical expressions and in the possibility of multiple instances of the same entity type representing the same mathematical object, no advantage was seen in attempting to add rules to prevent it or in forcing use of an inconvenient representation. Consider representing stem:[R^(64)] using an instance of <<express:mathematical_functions_schema.listed_product_space,listed_product_space>>.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: factors
      remarks:
      - The list of mathematical spaces which are the factors of the finite Cartesian
        product space.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::List
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_space
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The members of *factors* are all constant expressions.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: SIZEOF
        parameters:
        - _class: Expressir::Model::Expressions::QueryExpression
          id: space
          aggregate_source:
            _class: Expressir::Model::References::SimpleReference
            id: factors
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.listed_product_space.factors
          expression:
            _class: Expressir::Model::Expressions::UnaryExpression
            operator: NOT
            operand:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: expression_is_constant
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: space
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The graph of <<express:mathematical_functions_schema.maths_space,maths_space>>
        references emanating from an instance of <<express:mathematical_functions_schema.listed_product_space,listed_product_space>>
        contains no cycles.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: no_cyclic_space_reference
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.no_cyclic_space_reference
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::Expressions::AggregateInitializer
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - |-
        The empty space shall not be a factor space.

        [example]
        ====
        The mathematical space of all triples such that the first component is an integer, the second is a real number in the closed interval from minus one to one, and the third is a boolean value:

        [stem%unnumbered]
        ++++
        Z xx {x in R | -1 <= x <= 1} xx {true, false}
        ++++

        where stem:[Z] represents the set of integers, can be represented by the entity instance:

        [%unnumbered]
        [source]
        ----
        LOCAL
          spc : listed_product_space := make_listed_product_space([the_integers,
            the_neg1_one_interval, the_booleans]);
        END_LOCAL;
        ----

        Three constants representing the needed factor spaces are defined in the *mathematical_functions_schema* and used here to make one new instance representing the desired Cartesian product space.
        ====
      expression:
        _class: Expressir::Model::Expressions::UnaryExpression
        operator: NOT
        operand:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: IN
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: the_empty_space
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.the_empty_space
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: factors
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.listed_product_space.factors
  - _class: Expressir::Model::Declarations::Entity
    id: extended_tuple_space
    remarks:
    - |-
      This type of <<express:mathematical_functions_schema.maths_space,maths_space>> and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> represents spaces of ordered tuples with a certain number of initial components belonging to a fixed list of spaces, followed by an arbitrary number of components from a fixed space. These spaces represent domains of functions with a fixed list of initial arguments and types followed by an arbitrary number of additional arguments, all of the same type. The fixed list of initial arguments may be an empty list.

      NOTE: Among functions with an indefinite number of inputs, this is the only type provided for in this version of this schema.

      The tuple spaces represented by this type can be expressed as infinite unions of finite Cartesian products of a certain simple form. Let stem:[B] be the finite Cartesian product space represented by the value of *base* and stem:[E] be the space represented by the value of *extender*. Then the space represented by the instance of <<express:mathematical_functions_schema.extended_tuple_space,extended_tuple_space>> is

      [stem%unnumbered]
      ++++
      uuu_(i=0)^(oo) B xx_a E^i
      ++++

      where the associative Cartesian product operation is being used.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: base
      remarks:
      - |-
        The <<express:mathematical_functions_schema.tuple_space,tuple_space>> describing
        the common initial component spaces of all the ordered tuples belonging to this
        tuple space. When there are no common initial components, the value of *base*
        will be the zero-tuple space.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: tuple_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.tuple_space
    - _class: Expressir::Model::Declarations::Attribute
      id: extender
      remarks:
      - The <<express:mathematical_functions_schema.maths_space,maths_space>> from
        which the optional additional components come.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The values of *base* and *extender* are constant expressions.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: AND
        operand1:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: expression_is_constant
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: base
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.extended_tuple_space.base
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: expression_is_constant
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: extender
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.extended_tuple_space.extender
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The graph of <<express:mathematical_functions_schema.maths_space,maths_space>>
        references emanating from an instance of <<express:mathematical_functions_schema.extended_tuple_space,extended_tuple_space>>
        contains no cycles.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: no_cyclic_space_reference
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.no_cyclic_space_reference
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::Expressions::AggregateInitializer
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - The value of *extender* shall not be the empty space.
      expression:
        _class: Expressir::Model::References::SimpleReference
        id: extender
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.extended_tuple_space.extender
  - _class: Expressir::Model::Declarations::Entity
    id: function_space
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_space,maths_space>>
      and <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical spaces whose members are all the mathematical functions
      which satisfy the indicated constraints on their domains and ranges.
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: domain_constraint
      remarks:
      - The enumeration item identifying the kind of constraint to be imposed on the
        function domain.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: space_constraint_type
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.space_constraint_type
    - _class: Expressir::Model::Declarations::Attribute
      id: domain_argument
      remarks:
      - The mathematical space to be used in the constraint identified by *domain_constraint*.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    - _class: Expressir::Model::Declarations::Attribute
      id: range_constraint
      remarks:
      - The enumeration item identifying the kind of constraint to be imposed on the
        function range.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: space_constraint_type
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.space_constraint_type
    - _class: Expressir::Model::Declarations::Attribute
      id: range_argument
      remarks:
      - The mathematical space to be used in the constraint identified by *range_constraint*.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The values of *domain_argument* and *range_argument* shall be constant expressions.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: AND
        operand1:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: expression_is_constant
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: domain_argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_argument
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: expression_is_constant
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: range_argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_argument
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The values of *domain_argument* and *range_argument* shall not represent the
        empty space.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: AND
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: NOT_EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: domain_argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_argument
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: the_empty_space
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.the_empty_space
        operand2:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: NOT_EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: range_argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_argument
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: the_empty_space
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.the_empty_space
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR3
      remarks:
      - If the *domain_constraint* is *sc_member*, then the empty space shall not
        be a member of the *domain_argument*.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: NOT_EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: domain_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_constraint
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: sc_member
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.space_constraint_type.sc_member
        operand2:
          _class: Expressir::Model::Expressions::UnaryExpression
          operator: NOT
          operand:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: member_of
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.member_of
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: the_empty_space
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.the_empty_space
            - _class: Expressir::Model::References::SimpleReference
              id: domain_argument
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_argument
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR4
      remarks:
      - If the *range_constraint* is *sc_member*, then the empty space shall not be
        a member of the *range_argument*.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: NOT_EQUAL
          operand1:
            _class: Expressir::Model::References::SimpleReference
            id: range_constraint
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_constraint
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: sc_member
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.space_constraint_type.sc_member
        operand2:
          _class: Expressir::Model::Expressions::UnaryExpression
          operator: NOT
          operand:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: member_of
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.member_of
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: the_empty_space
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.the_empty_space
            - _class: Expressir::Model::References::SimpleReference
              id: range_argument
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_argument
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR5
      remarks:
      - |-
        This type shall not be used to represent the space of all mathematical functions.

        NOTE: The effect of rules *WR2*, *WR3* and *WR4* is to prevent instances of this type from representing the empty set or the set whose only member is the empty function.
      expression:
        _class: Expressir::Model::Expressions::UnaryExpression
        operator: NOT
        operand:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: AND
          operand1:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: any_space_satisfies
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.any_space_satisfies
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: domain_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_constraint
            - _class: Expressir::Model::References::SimpleReference
              id: domain_argument
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.domain_argument
          operand2:
            _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: any_space_satisfies
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.any_space_satisfies
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: range_constraint
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_constraint
            - _class: Expressir::Model::References::SimpleReference
              id: range_argument
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_space.range_argument
