        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
      - _class: Expressir::Model::References::SimpleReference
        id: maths_function
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_function
  - _class: Expressir::Model::Declarations::Type
    id: real_interval
    remarks:
    - |-
      A <<express:mathematical_functions_schema.real_interval,real_interval>> is a selection from among the entity types representing non-empty, non-trivial, real intervals.

      NOTE: The empty interval and the single point interval are not representable by this type. All other real intervals have a value-unique representation in this type.
    underlying_type:
      _class: Expressir::Model::DataTypes::Select
      items:
      - _class: Expressir::Model::References::SimpleReference
        id: real_interval_from_min
