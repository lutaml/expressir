  - _class: Expressir::Model::Declarations::Function
    id: member_of
    remarks:
    - |-
      This function attempts to determine whether a given mathematical value is a member of a given mathematical space. Where the information accessible to this function is not sufficient to determine the matter, UNKNOWN is returned.

      NOTE: The EXPRESS code below introduces and uses the trivial function *fedex* solely to avoid an error in the NIST Fedex compiler. Although technically unnecessary, the extra code is correct and should have no detectable consequences.
    - Trivial function introduced to avoid NIST Fedex compiler error
    - Should be unreachable
    - member_of
    remark_items:
    - _class: Expressir::Model::Declarations::RemarkItem
      id: return
      remarks:
      - "(output) A LOGICAL value which is TRUE if the value can be determined to
        be a member of the space, FALSE if the value can be determined not to be a
        member of the space, and UNKNOWN, otherwise."
    untagged_remarks:
    - text: Trivial function introduced to avoid NIST Fedex compiler error
      format: tail
    - text: Should be unreachable
      format: tail
    - text: member_of
      format: tail
    parameters:
    - _class: Expressir::Model::Declarations::Parameter
      id: val
