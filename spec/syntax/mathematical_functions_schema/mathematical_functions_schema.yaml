      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: tuple_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.tuple_space
    - _class: Expressir::Model::Declarations::Attribute
      id: parameters
      remarks:
      - The parameters, if any, defining the function. When no parameters are required,
        the empty list shall be used.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::List
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_value
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_value
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The domain shall be a constant expression.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: expression_is_constant
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: explicit_domain
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.application_defined_function.explicit_domain
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - |-
        The range shall be a constant expression.

        NOTE: The expressions defining the domains and ranges of all functions defined in this schema are prevented from containing variables and thereby denoting indeterminate spaces. This technical restriction does not interfere with the contemplated applications and makes it practical to implement more of the semantic rules in Express. Some future edition of this document may choose to relax these requirements.
      expression:
