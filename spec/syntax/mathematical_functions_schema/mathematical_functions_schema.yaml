  - _class: Expressir::Model::Declarations::Type
    id: open_closed
    remarks:
    - This enumeration type is used to indicate whether real intervals are topologically
      open or closed at their endpoints. If the real interval is closed at an endpoint,
      the endpoint is a member of the real interval; otherwise, the endpoint is not
      a member of the real interval.
    underlying_type:
      _class: Expressir::Model::DataTypes::Enumeration
      items:
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: open
        remarks:
        - Indicator that the real interval is topologically open at the associated
          endpoint, that is, that the boundary point is not a member of the interval.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: closed
        remarks:
        - Indicator that the real interval is topologically closed at the associated
          endpoint, that is, that the boundary point is a member of the interval.
  - _class: Expressir::Model::Declarations::Type
    id: space_constraint_type
    remarks:
    - This enumeration type is used to indicate which of three possible constraints
      on a mathematical space is to be used in a given context. The possibilities
      are that one space is equal to another, a subspace of another, or a member of
      another.
    underlying_type:
      _class: Expressir::Model::DataTypes::Enumeration
      items:
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: sc_equal
        remarks:
        - Indicator that the subject space shall be equal to the given argument space.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: sc_subspace
        remarks:
        - Indicator that the subject space shall be a subspace, but not necessarily
          a proper subspace, of the given argument space.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: sc_member
        remarks:
        - Indicator that the subject space shall be member of the given argument space.
  - _class: Expressir::Model::Declarations::Type
    id: repackage_options
    remarks:
    - This enumeration type is used by <<express:mathematical_functions_schema.repackaging_function,repackaging_function>>
      instances to identify repackaging options for inputs and outputs.
    underlying_type:
      _class: Expressir::Model::DataTypes::Enumeration
      items:
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: ro_nochange
        remarks:
        - Indicator that no repackaging is to occur.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: ro_wrap_as_tuple
        remarks:
        - Indicator that multiple values are to be repackaged as a single tuple of
          values.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: ro_unwrap_tuple
        remarks:
        - Indicator that a single tuple value is to be repackaged as multiple values.
  - _class: Expressir::Model::Declarations::Type
    id: extension_options
    remarks:
    - |-
      This enumeration type identifies certain common mathematical mechanisms for extending the exact domain of a function in an unambiguous way to boundary and other technically singular inputs.

      NOTE: This type is used by <<express:mathematical_functions_schema.partial_derivative_function,partial_derivative_function>> instances to identify which of certain common extensions to the function determined by the strictest notion of differentiability are to be made.
    underlying_type:
      _class: Expressir::Model::DataTypes::Enumeration
      items:
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: eo_none
        remarks:
        - Indicator that no extension shall occur.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: eo_cont
        remarks:
        - Indicator that extension by continuity shall occur. Wherever an unambiguous
          value can be computed which preserves continuity, the function shall be
          defined there and output that value.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: eo_cont_right
        remarks:
        - Indicator that extension by continuity shall occur and, when and where continuity
          to the right is meaningful, extension by continuity to the right shall occur.
      - _class: Expressir::Model::DataTypes::EnumerationItem
        id: eo_cont_left
        remarks:
        - |-
          Indicator that extension by continuity shall occur and, when and where continuity to the left is meaningful, extension by continuity to the left shall occur.

          NOTE: Extension by continuity to the right or left is only meaningful in the context of the real numbers. When extension by continuity occurs, the value produced is necessarily the same as the values produced by continuity to the right or continuity to the left.
  - _class: Expressir::Model::Declarations::Type
    id: maths_enum_atom
    remarks:
