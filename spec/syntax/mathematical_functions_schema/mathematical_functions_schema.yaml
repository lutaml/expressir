        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_denoted_function
      - _class: Expressir::Model::References::SimpleReference
        id: imported_point_function
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.imported_point_function
      - _class: Expressir::Model::References::SimpleReference
