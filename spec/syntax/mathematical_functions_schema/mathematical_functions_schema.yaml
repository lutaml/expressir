      the recursive constructions for types <<express:mathematical_functions_schema.atom_based_value,atom_based_value>>
      and <<express:mathematical_functions_schema.maths_value,maths_value>>.
    underlying_type:
      _class: Expressir::Model::DataTypes::Select
      items:
      - _class: Expressir::Model::References::SimpleReference
