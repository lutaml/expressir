          id: operands
      type:
        _class: Expressir::Model::DataTypes::List
        bound1:
          _class: Expressir::Model::Literals::Integer
          value: '3'
        bound2:
          _class: Expressir::Model::Literals::Integer
          value: '3'
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_function
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_function
    - _class: Expressir::Model::Declarations::Attribute
      id: default_entry
      remarks:
      - The constant output value for all positions not specifically identified as
        having a non-default value.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_value
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_value
    - _class: Expressir::Model::Declarations::Attribute
      id: order
      remarks:
      - Indicator for whether the non-default output values are ordered by rows or
        by columns.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: ordering_type
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.ordering_type
    - _class: Expressir::Model::Declarations::DerivedAttribute
      id: index
      remarks:
      - Function providing starting locations in *loc* and *val* for the non-default
        pairs in each row (if *order* = *by_rows*&#x200c;) or column (if *order* =
        *by_columns*&#x200c;). Derived to be the same as the first operand.
