        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.atom_based_value
  - _class: Expressir::Model::Declarations::Type
    id: atom_based_value
    remarks:
    - |-
      This type represents all values constructed from <<express:mathematical_functions_schema.maths_atom,maths_atom>> values by recursive formations of tuples. The EXPRESS representation is arbitrarily nested lists of atoms or the atoms themselves.

      NOTE: Since there is no mechanism for self reference, the values are necessarily finite and acyclic. Note, in particular, that no entity instances can participate in values of this type.
    underlying_type:
      _class: Expressir::Model::DataTypes::Select
      items:
      - _class: Expressir::Model::References::SimpleReference
        id: maths_atom
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_atom
      - _class: Expressir::Model::References::SimpleReference
        id: atom_based_tuple
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.atom_based_tuple
  - _class: Expressir::Model::Declarations::Type
    id: maths_tuple
    remarks:
    - |-
      This type represents the mathematical ordered tuple.

      NOTE: The semantics of mathematical ordered tuple differs subtly from that of the EXPRESS list aggregate in that there are no notions of creation or destruction or element insertion or removal operations.

      NOTE: In the context of formal mathematics, there is a single object which can be called the zero-tuple. It is naturally represented by a zero-length list. This object is permitted in the type <<express:mathematical_functions_schema.maths_tuple,maths_tuple>>, but not in the other tuple types.
    underlying_type:
      _class: Expressir::Model::DataTypes::List
      bound1:
        _class: Expressir::Model::Literals::Integer
        value: '0'
      bound2:
        _class: Expressir::Model::References::SimpleReference
        id: "?"
      unique: false
      base_type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_value
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_value
  - _class: Expressir::Model::Declarations::Type
    id: maths_value
    remarks:
    - |-
      This type is intended to encompass any data value which could be an input to a mathematical function, an output from a mathematical function, or useful in defining a mathematical function.

      NOTE: The EXPRESS type "generic" would be appropriate if it were allowed. Instead, applications needing to use data values not belonging to this type will have to define additional subtypes of the supertypes provided in this schema.
    underlying_type:
      _class: Expressir::Model::DataTypes::Select
      items:
      - _class: Expressir::Model::References::SimpleReference
        id: atom_based_value
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.atom_based_value
      - _class: Expressir::Model::References::SimpleReference
        id: maths_tuple
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_tuple
      - _class: Expressir::Model::References::SimpleReference
        id: generic_expression
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: constancy
      remarks:
      - If a <<express:mathematical_functions_schema.maths_value,maths_value>> is
        a <<express:iso13584_generic_expressions_schema.generic_expression,generic_expression>>
        then it shall denote a constant mathematical object.
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: OR
        operand1:
          _class: Expressir::Model::Expressions::UnaryExpression
          operator: NOT
          operand:
            _class: Expressir::Model::Expressions::BinaryExpression
            operator: IN
            operand1:
              _class: Expressir::Model::Literals::String
              value: GENERIC_EXPRESSION
            operand2:
              _class: Expressir::Model::Expressions::FunctionCall
              function:
                _class: Expressir::Model::References::SimpleReference
                id: stripped_typeof
                base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.stripped_typeof
              parameters:
              - _class: Expressir::Model::References::SimpleReference
                id: SELF
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: expression_is_constant
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: SELF
  - _class: Expressir::Model::Declarations::Type
    id: maths_expression
    remarks:
    - This type is intended to encompass any expression recognizable as mathematical.
    underlying_type:
      _class: Expressir::Model::DataTypes::Select
      items:
