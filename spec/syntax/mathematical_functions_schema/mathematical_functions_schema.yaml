  - _class: Expressir::Model::Declarations::Entity
    id: atom_based_literal
    remarks:
    - |-
      This type of <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> represents recursively constructed tuples of atomic constants in expressions. The atomic constants in this schema are all the values of EXPRESS simple types and all the enumeration items of the EXPRESS enumeration types defined in this schema.

      NOTE: All the constants represented by the preceding subtypes of <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> may also be represented using <<express:mathematical_functions_schema.atom_based_literal,atom_based_literal>>. It is recommended that the simpler subtypes be used where possible for the sake of readability. It may also be the case that some applications will not need the general case and not permit its use. Another complication is that an <<express:mathematical_functions_schema.atom_based_value,atom_based_value>> with a real value will not be recognized as a *real_numeric_literal* and not be usable in real numeric expressions from *iso13584_expressions_schema*. The analogous complication exists for single integer, boolean and string values.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: generic_literal
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: lit_value
      remarks:
      - The EXPRESS value representing the mathematical value which is to be represented
        by this literal in expressions.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: atom_based_value
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.atom_based_value
  - _class: Expressir::Model::Declarations::Entity
    id: maths_tuple_literal
    remarks:
    - This type of <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents ordered tuples of arbitrary mathematical objects in expressions.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: generic_literal
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: lit_value
      remarks:
      - The list of EXPRESS values representing the components of the mathematical
        ordered tuple which is to be represented by this literal in expressions.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::List
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_value
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_value
  - _class: Expressir::Model::Declarations::Entity
    id: maths_variable
    remarks:
    - |-
      This type of <<express:iso13584_generic_expressions_schema.generic_variable,generic_variable>> represents a variable ranging over a given mathematical space of values.

      NOTE: The identity of a <<express:mathematical_functions_schema.maths_variable,maths_variable>> is derived from its identity as an entity instance, so the presence or absence of a name is irrelevant to its role in any expression. However, for many applications, a name contains very useful information, especially in rendering the expression for human readers.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: generic_variable
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: values_space
      remarks:
      - The mathematical space of possible values of the variable.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_space
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_space
    - _class: Expressir::Model::Declarations::Attribute
      id: name
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: label
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The value of attribute *values_space* shall be a constant expression.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: expression_is_constant
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.expression_is_constant
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: values_space
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_variable.values_space
  - _class: Expressir::Model::Declarations::Entity
    id: maths_real_variable
    remarks:
    - This type of <<express:mathematical_functions_schema.maths_variable,maths_variable>>
      and <<express:iso13584_expressions_schema.real_numeric_variable,real_numeric_variable>>
      makes a convenient representation for variables ranging over the real numbers.
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The value of inherited attribute *values_space* is a subspace of the real
        numbers.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
