        id: triangular_matrix
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.triangular_matrix
      - _class: Expressir::Model::References::SimpleReference
        id: symmetric_matrix
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.symmetric_matrix
      - _class: Expressir::Model::References::SimpleReference
        id: banded_matrix
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.banded_matrix
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: operand
      kind: EXPLICIT
      supertype_attribute:
        _class: Expressir::Model::References::AttributeReference
        ref:
          _class: Expressir::Model::References::GroupReference
          ref:
            _class: Expressir::Model::References::SimpleReference
            id: SELF
          entity:
            _class: Expressir::Model::References::SimpleReference
            id: unary_generic_expression
        attribute:
