          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.subspace_of_es
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::References::SimpleReference
          id: es_strings
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.elementary_space_enumerators.es_strings
  - _class: Expressir::Model::Declarations::Entity
    id: function_application
    remarks:
    - |-
      This type of <<express:iso13584_generic_expressions_schema.multiple_arity_generic_expression,multiple_arity_generic_expression>> represents a mathematical expression that specifies the application of a mathematical function to an appropriate set of arguments. Such a mathematical expression shall denote the first output of evaluation of the function on those arguments.

      NOTE In contrast to common usage, this schema admits the possibility of mathematical functions with multiple outputs. Such functions are often called "procedures". If an expression created by applying such a function to arguments is to be interpreted as having a single denotation, then it is hereby declared to denote the first of its outputs.
    remark_items:
    - _class: Expressir::Model::Declarations::RemarkItem
      id: SELF\multiple_arity_generic_expression
      remarks:
      - |-
        The inherited attribute *operands* is derived by prepending the function to the list of arguments.

        NOTE: For the convenience of users, most of the expression "operations" in this schema use attributes which are not themselves of type <<express:iso13584_generic_expressions_schema.generic_expression,generic_expression>> but are of simpler non-entity types. It is easy to derive the corresponding <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>> instances from these types. From these instances, it is easy to derive the inherited *operands* attribute.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: multiple_arity_generic_expression
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: func
      remarks:
      - The function to be applied.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: maths_function_select
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_function_select
    - _class: Expressir::Model::Declarations::Attribute
      id: arguments
      remarks:
      - The list of arguments to which the function is to be applied.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::List
        bound1:
          _class: Expressir::Model::Literals::Integer
          value: '1'
        bound2:
          _class: Expressir::Model::References::SimpleReference
          id: "?"
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: maths_expression
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.maths_expression
    - _class: Expressir::Model::Declarations::DerivedAttribute
      id: operands
      kind: DERIVED
      supertype_attribute:
        _class: Expressir::Model::References::AttributeReference
        ref:
          _class: Expressir::Model::References::GroupReference
          ref:
            _class: Expressir::Model::References::SimpleReference
            id: SELF
          entity:
            _class: Expressir::Model::References::SimpleReference
            id: multiple_arity_generic_expression
        attribute:
          _class: Expressir::Model::References::SimpleReference
          id: operands
      type:
        _class: Expressir::Model::DataTypes::List
        bound1:
          _class: Expressir::Model::Literals::Integer
          value: '2'
        bound2:
          _class: Expressir::Model::References::SimpleReference
          id: "?"
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: generic_expression
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: ADDITION
        operand1:
          _class: Expressir::Model::Expressions::AggregateInitializer
          items:
          - _class: Expressir::Model::Expressions::FunctionCall
            function:
              _class: Expressir::Model::References::SimpleReference
              id: convert_to_maths_function
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.convert_to_maths_function
            parameters:
            - _class: Expressir::Model::References::SimpleReference
              id: func
              base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_application.func
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: convert_to_operands
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.convert_to_operands
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: arguments
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_application.arguments
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - |-
        The number of arguments shall match the dimension of the function domain and the value spaces of the individual arguments shall be compatible with the corresponding function domain factor spaces.

        [example]
        ====
        To represent the mathematical expression stem:[text(atan2)(y, 1)], the following instance of <<express:mathematical_functions_schema.function_application,function_application>> could be constructed:

        [%unnumbered]
        [source]
        ----
        LOCAL
          vrbl_y    : maths_real_variable := make_maths_real_variable(the_reals, 'y');
          atan2_y_1 : function_application := make_function_application(ef_atan2_r,
            [vrbl_y, 1.0]);
        END_LOCAL;
        ----

        Two entity instances are constructed. The first creates an instance of <<express:iso13584_generic_expressions_schema.generic_variable,generic_variable>> representing a variable ranging over the real numbers and labeled 'stem:[y]'. The second creates an instance of <<express:iso13584_generic_expressions_schema.generic_expression,generic_expression>> representing the application of real-valued function stem:[text(atan2)] to the list of two arguments consisting of the variable stem:[y] and the constant 1.0.
        ====
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: function_applicability
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.function_applicability
