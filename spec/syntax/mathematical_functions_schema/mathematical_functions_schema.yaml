          id: subspace_of_es
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.subspace_of_es
        parameters:
        - _class: Expressir::Model::References::SimpleReference
          id: SELF
        - _class: Expressir::Model::References::SimpleReference
