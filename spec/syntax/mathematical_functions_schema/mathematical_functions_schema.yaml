            id: es_reals
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.elementary_space_enumerators.es_reals
  entities:
  - _class: Expressir::Model::Declarations::Entity
    id: quantifier_expression
    remarks:
    - |-
      This abstract type of <<express:iso13584_generic_expressions_schema.multiple_arity_generic_expression,multiple_arity_generic_expression>> distinguishes those expressions which are quantifier expressions. Certain of the operands of a quantifier expression are restricted to variables. These variables are said to be bound by the quantifier and their semantics is determined by the quantifier. The variables which are bound by a quantifier are not available for substitution operations, that is, they may not be subsequently tied to particular constant values. The semantics of the quantifier expression depends on all the possible values of each of its bound variables rather than varying with the association of variables to particular values.

      NOTE: This type together with entity type <<express:mathematical_functions_schema.bound_variable_semantics,bound_variable_semantics>>, function <<express:mathematical_functions_schema.free_variables_of,free_variables_of>> and <<express:mathematical_functions_schema.expression_is_constant,expression_is_constant>> generically extend the *iso13584_generic_expressions_schema* to handle operations which involve logical quantifiers.

      NOTE: Function <<express:mathematical_functions_schema.has_values_space,has_values_space>> identifies which generic expressions pertain to the *mathematical_functions_schema* and, consequently, have associated spaces of possible values given by function <<express:mathematical_functions_schema.values_space_of,values_space_of>>.
    abstract: true
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: multiple_arity_generic_expression
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: variables
      remarks:
      - The list of variables bound by the quantifier operation.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::List
        bound1:
          _class: Expressir::Model::Literals::Integer
          value: '1'
        bound2:
          _class: Expressir::Model::References::SimpleReference
          id: "?"
        base_type:
          _class: Expressir::Model::References::SimpleReference
          id: generic_variable
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The variables listed in attribute <<express:iso13584_expressions_schema.variable,variables>>
        are among the operands of the operation.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: SIZEOF
        parameters:
        - _class: Expressir::Model::Expressions::QueryExpression
          id: vrbl
          aggregate_source:
            _class: Expressir::Model::References::SimpleReference
            id: variables
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.quantifier_expression.variables
          expression:
            _class: Expressir::Model::Expressions::UnaryExpression
            operator: NOT
            operand:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: IN
              operand1:
                _class: Expressir::Model::References::SimpleReference
                id: vrbl
              operand2:
                _class: Expressir::Model::References::SimpleReference
                id: SELF
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The variables listed in attribute <<express:iso13584_expressions_schema.variable,variables>>
        have the semantics of bound variables.
      expression:
        _class: Expressir::Model::Expressions::FunctionCall
        function:
          _class: Expressir::Model::References::SimpleReference
          id: SIZEOF
        parameters:
        - _class: Expressir::Model::Expressions::QueryExpression
          id: vrbl
          aggregate_source:
            _class: Expressir::Model::References::SimpleReference
            id: variables
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.quantifier_expression.variables
          expression:
            _class: Expressir::Model::Expressions::UnaryExpression
            operator: NOT
            operand:
              _class: Expressir::Model::Expressions::BinaryExpression
              operator: IN
              operand1:
                _class: Expressir::Model::Expressions::BinaryExpression
                operator: ADDITION
                operand1:
                  _class: Expressir::Model::References::SimpleReference
                  id: schema_prefix
                  base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.schema_prefix
                operand2:
                  _class: Expressir::Model::Literals::String
                  value: BOUND_VARIABLE_SEMANTICS
              operand2:
                _class: Expressir::Model::Expressions::FunctionCall
                function:
                  _class: Expressir::Model::References::SimpleReference
                  id: TYPEOF
                parameters:
                - _class: Expressir::Model::References::SimpleReference
                  id: vrbl
  - _class: Expressir::Model::Declarations::Entity
    id: dependent_variable_definition
    remarks:
    - |-
      This subtype of <<express:iso13584_generic_expressions_schema.unary_generic_expression,unary_generic_expression>> defines a dependent variable. From the viewpoint of the formal language of mathematical expressions, a dependent variable is merely an abbreviation for a subexpression which is being given special attention because of its significance or frequency of occurence in other expressions.

      NOTE: Observe that a dependent variable is not a variable at all! In particular, it is not a logical variable, may not be quantified, may not be assigned a value (other than that resulting from the defining expression), and will not appear in lists of used or free variables. It has significance for rendering operations, which should use the associated name instead of rendering the defining expression when a reference to the <<express:mathematical_functions_schema.dependent_variable_definition,dependent_variable_definition>> instance is used in another expression, and it has significance for computational operations, which may improve efficiency of computation by saving and reusing its value under appropriate circumstances, but it has no effect on the meaning of the defining expression as a formal expression.
    remark_items:
    - _class: Expressir::Model::Declarations::RemarkItem
      id: SELF\unary_generic_expression
      remarks:
      - The expression defining the dependent variable.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: unary_generic_expression
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: name
      remarks:
      - The label identifying the dependent variable.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: label
    - _class: Expressir::Model::Declarations::Attribute
      id: description
      remarks:
      - |-
        Descriptive information for the dependent variable or defining expression.

        NOTE: The description may also include information about the preferred rendering of the dependent variable or the defining expression in some presentation system such as TeX or XML. Of course, only certain receiving systems would be able to make use of such information.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::References::SimpleReference
        id: text
  - _class: Expressir::Model::Declarations::Entity
    id: bound_variable_semantics
    remarks:
    - This type of <<express:iso13584_generic_expressions_schema.variable_semantics,variable_semantics>>
      indicates that a variable is a bound variable whose semantics is determined
      by the quantifier expression which references the variable in its <<express:iso13584_expressions_schema.variable,variables>>
      attribute.
    remark_items:
    - _class: Expressir::Model::Declarations::RemarkItem
      id: wr
      remarks:
      - Only those variables which are listed in the <<express:iso13584_expressions_schema.variable,variables>>
        attribute of a quantifier expression may have this semantics.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: variable_semantics
  - _class: Expressir::Model::Declarations::Entity
    id: free_variable_semantics
    remarks:
    - This type of <<express:iso13584_generic_expressions_schema.variable_semantics,variable_semantics>>
      indicates that a variable has no further semantics beyond what is implied by
      its use in an expression. This could occur when the expression itself is the
      object of interest.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: variable_semantics
  - _class: Expressir::Model::Declarations::Entity
    id: complex_number_literal
    remarks:
    - This type of <<express:iso13584_generic_expressions_schema.generic_literal,generic_literal>>
      represents mathematical complex number constants in expressions.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: generic_literal
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: real_part
      remarks:
      - The value of the real part of the complex number which is to be represented
        by this literal in expressions.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: imag_part
      remarks:
      - The value of the imaginary part of the complex number which is to be represented
        by this literal in expressions.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
  - _class: Expressir::Model::Declarations::Entity
    id: complex_number_literal_polar
    remarks:
    - A <<express:mathematical_functions_schema.complex_number_literal_polar,complex_number_literal_polar>>
      is a type of <<express:mathematical_functions_schema.complex_number_literal,complex_number_literal>>
      defined by the values of its moduus and argument.
    subtype_of:
    - _class: Expressir::Model::References::SimpleReference
      id: complex_number_literal
      base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal
    attributes:
    - _class: Expressir::Model::Declarations::Attribute
      id: modulus
      remarks:
      - The value of the modulus of the complex number. This is equal to the distance
        from the point representing the complex number to the origin of the complex
        plane.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::Attribute
      id: argument
      remarks:
      - The value of the argument of the complex number. This is equal to the angle
        between the line joining the point representiong the complex number to the
        origin and the real axis.
      kind: EXPLICIT
      type:
        _class: Expressir::Model::DataTypes::Real
    - _class: Expressir::Model::Declarations::DerivedAttribute
      id: real_part
      kind: DERIVED
      supertype_attribute:
        _class: Expressir::Model::References::AttributeReference
        ref:
          _class: Expressir::Model::References::GroupReference
          ref:
            _class: Expressir::Model::References::SimpleReference
            id: SELF
          entity:
            _class: Expressir::Model::References::SimpleReference
            id: complex_number_literal
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal
        attribute:
          _class: Expressir::Model::References::SimpleReference
          id: real_part
      type:
        _class: Expressir::Model::DataTypes::Real
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: MULTIPLICATION
        operand1:
          _class: Expressir::Model::References::SimpleReference
          id: modulus
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.modulus
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: cos
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.argument
    - _class: Expressir::Model::Declarations::DerivedAttribute
      id: imag_part
      kind: DERIVED
      supertype_attribute:
        _class: Expressir::Model::References::AttributeReference
        ref:
          _class: Expressir::Model::References::GroupReference
          ref:
            _class: Expressir::Model::References::SimpleReference
            id: SELF
          entity:
            _class: Expressir::Model::References::SimpleReference
            id: complex_number_literal
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal
        attribute:
          _class: Expressir::Model::References::SimpleReference
          id: imag_part
      type:
        _class: Expressir::Model::DataTypes::Real
      expression:
        _class: Expressir::Model::Expressions::BinaryExpression
        operator: MULTIPLICATION
        operand1:
          _class: Expressir::Model::References::SimpleReference
          id: modulus
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.modulus
        operand2:
          _class: Expressir::Model::Expressions::FunctionCall
          function:
            _class: Expressir::Model::References::SimpleReference
            id: sin
          parameters:
          - _class: Expressir::Model::References::SimpleReference
            id: argument
            base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.argument
    where_rules:
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR1
      remarks:
      - The *modulus* shall not be negative.
      expression:
        _class: Expressir::Model::References::SimpleReference
        id: modulus
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.modulus
    - _class: Expressir::Model::Declarations::WhereRule
      id: WR2
      remarks:
      - The *argument* shall be between 0 and stem:[2 pi].
      expression:
        _class: Expressir::Model::Expressions::Interval
        low:
          _class: Expressir::Model::Literals::Integer
          value: '0'
        operator1: LESS_THAN_OR_EQUAL
        item:
          _class: Expressir::Model::References::SimpleReference
          id: argument
          base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.complex_number_literal_polar.argument
        operator2: LESS_THAN_OR_EQUAL
        high:
          _class: Expressir::Model::Expressions::BinaryExpression
          operator: MULTIPLICATION
          operand1:
            _class: Expressir::Model::Literals::Integer
            value: '2'
          operand2:
            _class: Expressir::Model::References::SimpleReference
            id: PI
