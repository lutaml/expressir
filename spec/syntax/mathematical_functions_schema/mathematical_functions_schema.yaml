    id: atom_based_tuple
    remarks:
    - This type provides representations for arbitrary finite tuples of <<express:mathematical_functions_schema.atom_based_value,atom_based_value>>
      values.
    underlying_type:
      _class: Expressir::Model::DataTypes::List
      unique: false
      base_type:
        _class: Expressir::Model::References::SimpleReference
