      - _class: Expressir::Model::References::SimpleReference
        id: finite_real_interval
        base_path: spec/syntax/mathematical_functions_schema/mathematical_functions_schema.exp.mathematical_functions_schema.finite_real_interval
      - _class: Expressir::Model::References::SimpleReference
