    remarks:
    - This function constructs a value for the inherited domain attribute of an instance
      of <<express:mathematical_functions_schema.definite_integral_function,definite_integral_function>>.
      It prefixes zero, one or two copies of the domain of the variable of integration
      to the domain of the integrand minus the factor space corresponding to the variable
      of integration. The number of prefixed factors matches the number of finite
      bounds of the integral. The packaging is chosen to match that of the integrand
      function.
